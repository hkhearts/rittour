<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIT Virtual Tour</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            /* Subtle background gradient for depth */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.04), transparent 25%);
        }

        /* Simple Navbar */
        nav {
            padding: 24px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            animation: fadeInUp 1s ease-out;
        }

        .badge {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            max-width: 800px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: clamp(1.1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Interactive Call-To-Action Button */
        .explore-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5);
        }

        .explore-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(37, 99, 235, 0.6);
        }

        .explore-btn svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .explore-btn:hover svg {
            transform: translateX(4px);
        }

        /* Entrance Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            nav { padding: 20px; justify-content: center; }
            .hero { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RIT AR/VR</div>
    </nav>

    <main class="hero">
        <div class="badge">Immersive Campus Experience</div>
        
        <h1>Welcome to Ramco Institute of Technology</h1>
        
        <p class="subtitle">Step inside and explore the campus from anywhere. Navigate the corridors, labs, and grounds through our interactive 360° virtual tour with integrated voice guidance.</p>
        
        <a href="viewer.html" class="explore-btn">
            Explore RIT
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"></path>
            </svg>
        </a>
    </main>

</body>
</html>
