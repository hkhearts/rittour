}

viewerDiv.addEventListener("mousedown", () => {
  hideRotateInstruction();
  // If user drags the mouse, Pannellum stops auto-rotation by default.
  // This clears the timer so it doesn't suddenly jump rooms while they are dragging.
  if (isAutoTourMode) { clearTimeout(autoTourTimer); }
});
viewerDiv.addEventListener("touchstart", hideRotateInstruction);
window.addEventListener("keydown", hideRotateInstruction);

// Restart the auto tour timer when the user finishes dragging the mouse
viewerDiv.addEventListener("mouseup", () => {
  if (isAutoTourMode) { startAutoTourTimer(); }
});

function resetTour() {
  localStorage.clear();
  location.reload();
}

window.onload = initTour;

</script>
</body>
